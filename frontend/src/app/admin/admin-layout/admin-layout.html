<div class="flex h-screen bg-fondo dark:bg-fondo-dark font-lato overflow-hidden">
  
  <!-- Overlay Móvil -->
  @if (sidebarOpen()) {
    <div 
      class="fixed inset-0 bg-black/50 z-40 lg:hidden transition-opacity" 
      (click)="closeSidebar()"
    ></div>
  }

  <!-- Sidebar Lateral Fijo -->
  <aside 
    class="fixed lg:static inset-y-0 left-0 z-50 w-64 bg-white dark:bg-card-dark border-r border-gray-200 dark:border-slate-800 text-texto dark:text-slate-300 flex flex-col transition-transform duration-300 shadow-2xl lg:shadow-none lg:translate-x-0"
    [class.-translate-x-full]="!sidebarOpen()"
    [class.translate-x-0]="sidebarOpen()"
  >
    <!-- Logo Área -->
    <div class="h-16 flex items-center justify-between px-6 border-b border-gray-200 dark:border-slate-800 shrink-0 bg-gray-50/50 dark:bg-slate-800/40">
      <a routerLink="/" class="flex items-center gap-2 group">
        <img src="/logo-pisofacil-light.png" alt="Logo" class="h-8 transition-transform group-hover:scale-105 dark:hidden" />
        <img src="/logo-pisofacil-dark.png" alt="Logo" class="h-8 transition-transform group-hover:scale-105 hidden dark:block" />
        <span class="text-xs font-bold text-accent uppercase tracking-widest mt-1">Admin</span>
      </a>
      <!-- Botón cerrar móvil -->
      <button class="lg:hidden text-gray-500 dark:text-slate-400 hover:text-texto dark:hover:text-white" (click)="closeSidebar()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Navegación -->
    <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2">
      
      <a routerLink="/admin" routerLinkActive="bg-primary/10 dark:bg-primary/20 text-primary dark:text-white border-primary" [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center gap-3 px-4 py-3 rounded-lg border border-transparent hover:bg-gray-100 dark:hover:bg-slate-800/50 hover:text-primary dark:hover:text-white transition-all font-medium group" (click)="closeSidebar()">
        <span class="text-xl opacity-70 group-hover:opacity-100 transition-opacity">📊</span>
        <span>Dashboard</span>
      </a>

      <a routerLink="/admin/usuarios" routerLinkActive="bg-primary/10 dark:bg-primary/20 text-primary dark:text-white border-primary" 
         class="flex items-center gap-3 px-4 py-3 rounded-lg border border-transparent hover:bg-gray-100 dark:hover:bg-slate-800/50 hover:text-primary dark:hover:text-white transition-all font-medium group" (click)="closeSidebar()">
        <span class="text-xl opacity-70 group-hover:opacity-100 transition-opacity">👥</span>
        <span>Usuarios</span>
      </a>

      <a routerLink="/admin/reportes" routerLinkActive="bg-primary/10 dark:bg-primary/20 text-primary dark:text-white border-primary" 
         class="flex items-center gap-3 px-4 py-3 rounded-lg border border-transparent hover:bg-gray-100 dark:hover:bg-slate-800/50 hover:text-primary dark:hover:text-white transition-all font-medium group" (click)="closeSidebar()">
        <span class="text-xl opacity-70 group-hover:opacity-100 transition-opacity">📋</span>
        <span>Reportes</span>
      </a>
      
    </nav>

    <!-- Footer Sidebar -->
    <div class="p-4 border-t border-gray-200 dark:border-slate-800 shrink-0">
      <div class="flex items-center gap-3 px-4 py-3 mb-4 rounded-lg bg-gray-50 dark:bg-slate-800/30 border border-gray-100 dark:border-slate-700/50">
        @if (authService.currentUser()?.fotoPerfilUrl) {
          <img [src]="authService.currentUser()?.fotoPerfilUrl" alt="Avatar" class="w-8 h-8 rounded-full object-cover border border-slate-700/50 shrink-0">
        } @else {
          <div class="w-8 h-8 rounded-full bg-accent/20 text-accent flex items-center justify-center font-bold font-poppins shrink-0">
            {{ authService.currentUser()?.nombre?.charAt(0) | uppercase }}
          </div>
        }
        <div class="flex-1 min-w-0">
          <p class="text-sm font-bold text-texto dark:text-white truncate">{{ authService.currentUser()?.nombre }}</p>
          <p class="text-xs text-gray-500 dark:text-slate-400 truncate">Administrador</p>
        </div>
      </div>
      
      <button (click)="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-2 text-sm text-red-500 dark:text-red-400 hover:text-white hover:bg-red-500/90 dark:hover:bg-red-500/20 rounded-lg transition-colors border border-transparent hover:border-red-500/30">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
        </svg>
        Cerrar Sesión
      </button>
    </div>
  </aside>

  <!-- Contenido Principal -->
  <div class="flex-1 flex flex-col min-w-0 bg-white dark:bg-[#0B1117] transition-colors duration-300">
    
    <!-- Header Mini -->
    <header class="h-16 flex items-center justify-between px-4 sm:px-6 lg:px-8 border-b border-gray-200 dark:border-slate-800 shrink-0 bg-white/80 dark:bg-card-dark/80 backdrop-blur-md transition-colors duration-300">
      <!-- Izquierda -->
      <div class="flex items-center gap-4">
        <button class="lg:hidden text-gray-500 dark:text-slate-400 hover:text-texto dark:hover:text-white p-2 -ml-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors" (click)="toggleSidebar()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
          </svg>
        </button>
        <h1 class="text-xl font-bold text-texto dark:text-white font-poppins hidden sm:block transition-colors duration-300">Panel de Control</h1>
      </div>

      <!-- Derecha -->
      <div class="flex items-center gap-4">
        <!-- Botón Modo Oscuro -->
        <button (click)="toggleDarkMode()" class="text-xl sm:text-2xl hover:opacity-80 transition" aria-label="Toggle Dark Mode" title="Cambiar tema">
          @if (isDarkMode()) {
            ☀️
          } @else {
            🌙
          }
        </button>

        <a routerLink="/" class="text-sm font-medium text-gray-600 dark:text-slate-400 hover:text-texto dark:hover:text-white transition-colors flex items-center gap-1.5 border border-gray-300 dark:border-slate-700 hover:border-gray-400 dark:hover:border-slate-500 rounded-full px-4 py-1.5">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
          </svg>
          Volver a la App
        </a>
      </div>
    </header>

    <!-- Área desplazable (Router Outlet) -->
    <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
      <div class="max-w-7xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </main>
    
  </div>
</div>
