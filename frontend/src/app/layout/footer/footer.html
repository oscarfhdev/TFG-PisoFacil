<footer class="bg-[#0B1117] border-t border-slate-800 pt-16 pb-8 font-lato">
  <div class="container mx-auto px-6">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-12 mb-16">
      <!-- Col 1: Marca -->
      <div class="flex flex-col gap-6">
        <div class="flex items-center">
          <img 
            *ngIf="!logoError" 
            src="logo-pisofacil-dark.png" 
            alt="PisoFácil" 
            class="h-10 w-auto object-contain"
            (error)="logoError = true"
          >
          <span *ngIf="logoError" class="text-2xl font-bold text-white font-poppins">
            Piso<span class="text-primary">Fácil</span>
          </span>
        </div>
        <p class="text-slate-400 text-sm leading-relaxed max-w-xs">
          La plataforma premium para encontrar tu próximo hogar estudiantil en España de forma fácil y segura.
        </p>
      </div>

      <!-- Col 2: Navegación -->
      <div>
        <h4 class="text-white font-bold font-poppins mb-6 uppercase tracking-wider text-xs">Explorar</h4>
        <ul class="flex flex-col gap-4">
          <li><a routerLink="/" class="text-slate-400 hover:text-white transition-all duration-300 flex items-center gap-2 group"><span class="h-1.5 w-1.5 rounded-full bg-slate-700 group-hover:bg-primary transition-colors"></span> Inicio</a></li>
          <li><a routerLink="/buscar" class="text-slate-400 hover:text-white transition-all duration-300 flex items-center gap-2 group"><span class="h-1.5 w-1.5 rounded-full bg-slate-700 group-hover:bg-primary transition-colors"></span> Buscar Habitaciones</a></li>
          <li><a routerLink="/publicar" class="text-slate-400 hover:text-white transition-all duration-300 flex items-center gap-2 group"><span class="h-1.5 w-1.5 rounded-full bg-slate-700 group-hover:bg-primary transition-colors"></span> Publicar Anuncio</a></li>
        </ul>
      </div>

      <!-- Col 3: Soporte y Legal -->
      <div>
        <h4 class="text-white font-bold font-poppins mb-6 uppercase tracking-wider text-xs">Ayuda</h4>
        <ul class="flex flex-col gap-4">
          <li>
            <button 
              (click)="abrirReporte()" 
              class="text-slate-400 hover:text-white transition-all duration-300 flex items-center gap-2 group"
            >
              <i class="material-icons text-sm opacity-50 group-hover:opacity-100">flag</i>
              Reportar un problema
            </button>
          </li>
          <li><a routerLink="/legal" class="text-slate-400 hover:text-white transition-all duration-300 flex items-center gap-2 group"><i class="material-icons text-sm opacity-50 group-hover:opacity-100">gavel</i> Privacidad y Términos</a></li>
        </ul>
      </div>
    </div>

    <!-- Bottom Bar -->
    <div class="pt-8 border-t border-slate-800 flex flex-col md:flex-row items-center justify-between gap-6">
      <p class="text-slate-500 text-sm">
        © 2026 <span class="font-semibold text-slate-400">PisoFácil</span>. Todos los derechos reservados.
      </p>
      
      <div class="flex items-center gap-6">
        <a 
          href="https://github.com/oscarfhdev/TFG-PisoFacil" 
          target="_blank" 
          class="text-slate-400 hover:text-white transition-colors duration-300 flex items-center gap-2 text-sm"
          title="Ver en GitHub"
        >
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"></path>
          </svg>
          <span class="hidden sm:inline">Código Fuente</span>
        </a>
      </div>
    </div>
  </div>
</footer>
