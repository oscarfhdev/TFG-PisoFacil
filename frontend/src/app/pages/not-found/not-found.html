<div class="min-h-screen bg-fondo dark:bg-fondo-dark font-lato flex items-center justify-center p-4 transition-colors duration-300">
  <div class="bg-white dark:bg-card-dark rounded-2xl border border-gray-100 dark:border-slate-800 shadow-2xl w-full max-w-lg p-10 text-center relative overflow-hidden animate-fade-in transition-colors duration-300">
    
    <!-- Decorative elements matching login page -->
    <div class="absolute -top-24 -right-24 w-48 h-48 bg-primary opacity-10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-accent opacity-10 rounded-full blur-3xl"></div>

    <div class="relative z-10">
      <h1 class="text-9xl font-extrabold text-primary dark:text-primary font-poppins mb-4 tracking-tighter opacity-20">
        404
      </h1>
      
      <div class="-mt-20 mb-8">
        <h2 class="text-3xl font-bold text-texto dark:text-white font-poppins mb-4">
          ¡Página no encontrada!
        </h2>
        <p class="text-gray-500 dark:text-slate-400 mb-8 max-w-sm mx-auto">
          Parece que el sitio que buscas ha cambiado de piso o ya no está disponible en nuestra plataforma.
        </p>
      </div>

      <div class="flex flex-col gap-4">
        <button (click)="goHome()" 
                class="w-full bg-accent hover:bg-opacity-90 text-white font-bold py-4 px-6 rounded-lg transition-all duration-300 flex items-center justify-center gap-2 shadow-lg shadow-accent/20 font-poppins">
          <mat-icon>home</mat-icon>
          Volver al inicio
        </button>
        
        <button (click)="goBack()" 
                class="w-full bg-transparent border-2 border-gray-200 dark:border-slate-700 hover:border-accent dark:hover:border-accent text-gray-700 dark:text-slate-300 hover:text-accent dark:hover:text-accent font-bold py-4 px-6 rounded-lg transition-all duration-300 flex items-center justify-center gap-2 font-poppins">
          <mat-icon>arrow_back</mat-icon>
          Página anterior
        </button>
      </div>
    </div>
  </div>
</div>
